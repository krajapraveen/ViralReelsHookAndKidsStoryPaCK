# CreatorStudio AI - CI/CD Pipeline
# Automated testing, building, and deployment

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_load_tests:
        description: 'Run K6 load tests'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL || 'http://localhost:3000' }}

jobs:
  # ====================
  # Backend Tests
  # ====================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run backend tests
        working-directory: ./backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: creatorstudio_test
          JWT_SECRET: test-secret-key
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  # ====================
  # Frontend Tests
  # ====================
  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: Run linter
        working-directory: ./frontend
        run: yarn lint || true

      - name: Run unit tests
        working-directory: ./frontend
        run: yarn test --coverage --watchAll=false
        continue-on-error: true

      - name: Build frontend
        working-directory: ./frontend
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
        run: yarn build

  # ====================
  # E2E Tests with Cypress
  # ====================
  e2e-tests:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: Start backend server
        working-directory: ./backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: creatorstudio_test
          JWT_SECRET: test-secret-key
        run: |
          uvicorn server:app --host 0.0.0.0 --port 8001 &
          sleep 10

      - name: Start frontend server
        working-directory: ./frontend
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
        run: |
          yarn start &
          sleep 30

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: ./frontend
          browser: chrome
          config: baseUrl=http://localhost:3000
          wait-on: 'http://localhost:3000, http://localhost:8001/api/health'
          wait-on-timeout: 120

      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: frontend/cypress/videos

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots

  # ====================
  # Visual Regression Tests
  # ====================
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'pull_request'

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          yarn install --frozen-lockfile
          yarn add -D @percy/cli @percy/cypress

      - name: Start servers
        run: |
          cd backend && pip install -r requirements.txt
          cd backend && uvicorn server:app --host 0.0.0.0 --port 8001 &
          cd frontend && yarn start &
          sleep 30
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: creatorstudio_test
          JWT_SECRET: test-secret-key
          REACT_APP_BACKEND_URL: http://localhost:8001

      - name: Run Percy visual tests
        uses: percy/exec-action@v0.3.1
        with:
          command: "cd frontend && yarn cy:run --spec 'cypress/e2e/visual-regression.cy.js'"
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

  # ====================
  # Load Tests with K6
  # ====================
  load-tests:
    name: Load Tests (K6)
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: github.event.inputs.run_load_tests == 'true' || github.ref == 'refs/heads/main'

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Set up backend
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          uvicorn server:app --host 0.0.0.0 --port 8001 &
          sleep 10
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: creatorstudio_test
          JWT_SECRET: test-secret-key

      - name: Run K6 load tests
        working-directory: ./k6
        run: |
          k6 run --out json=results.json load-test.js

      - name: Upload K6 results
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6/results.json

      - name: Process K6 results for monitoring
        run: |
          python k6/process-results.py k6/results.json

  # ====================
  # Security Scan
  # ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'

      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=high || true

      - name: Run pip audit
        working-directory: ./backend
        run: |
          pip install pip-audit
          pip-audit || true

  # ====================
  # Deploy to Staging
  # ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: echo "Deploying to staging environment..."
        # Add your deployment scripts here

  # ====================
  # Deploy to Production
  # ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [e2e-tests, load-tests]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: echo "Deploying to production environment..."
        # Add your deployment scripts here
