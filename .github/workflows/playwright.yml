name: Playwright E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

env:
  PREVIEW_URL: https://video-factory-46.preview.emergentagent.com
  PRODUCTION_URL: https://visionary-suite.com

jobs:
  playwright-tests:
    name: Run Playwright Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install root dependencies
      run: npm install @playwright/test

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium firefox

    - name: Create test directories
      run: |
        mkdir -p .auth
        mkdir -p test-results
        mkdir -p playwright-report

    - name: Set test environment URL
      run: |
        if [ "${{ github.event.inputs.environment }}" == "production" ]; then
          echo "REACT_APP_BACKEND_URL=${{ env.PRODUCTION_URL }}" >> $GITHUB_ENV
        else
          echo "REACT_APP_BACKEND_URL=${{ env.PREVIEW_URL }}" >> $GITHUB_ENV
        fi

    - name: Run Playwright tests (Chromium)
      run: npx playwright test --project=chromium
      env:
        CI: true
      continue-on-error: true

    - name: Run Playwright tests (Firefox)
      run: npx playwright test --project=firefox
      env:
        CI: true
      continue-on-error: true

    - name: Generate test summary
      if: always()
      run: |
        echo "## Playwright Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f test-results/playwright-results.json ]; then
          echo "### Test Results:" >> $GITHUB_STEP_SUMMARY
          cat test-results/playwright-results.json | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    suites = data.get('suites', [])
    passed = sum(1 for s in suites for t in s.get('specs', []) for r in t.get('tests', []) if r.get('status') == 'passed')
    failed = sum(1 for s in suites for t in s.get('specs', []) for r in t.get('tests', []) if r.get('status') == 'failed')
    print(f'- ✅ Passed: {passed}')
    print(f'- ❌ Failed: {failed}')
except Exception as e:
    print(f'Could not parse results: {e}')
" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 14

    - name: Upload Screenshots on Failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: failure-screenshots
        path: test-results/**/*.png
        retention-days: 7

  # Notify on failure
  notify:
    name: Notify on Failure
    needs: playwright-tests
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: |
          echo "Playwright tests failed! Check the artifacts for details."
          # Add Slack/Discord/Email notification here if needed
