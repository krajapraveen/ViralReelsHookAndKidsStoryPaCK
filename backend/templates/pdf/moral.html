<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            width: 210mm;
            height: 297mm;
            background: linear-gradient(180deg, #F0FDF4 0%, #ECFDF5 50%, #D1FAE5 100%);
            position: relative;
            overflow: hidden;
        }
        
        .page {
            width: 100%;
            height: 100%;
            padding: 25mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* Decorative Background Pattern */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.1;
            background-image: 
                radial-gradient(circle at 20% 30%, #10B981 2px, transparent 2px),
                radial-gradient(circle at 80% 70%, #10B981 2px, transparent 2px),
                radial-gradient(circle at 40% 80%, #10B981 1.5px, transparent 1.5px),
                radial-gradient(circle at 60% 20%, #10B981 1.5px, transparent 1.5px);
            background-size: 100px 100px;
        }
        
        /* Top Decoration */
        .top-decoration {
            margin-bottom: 30px;
        }
        
        .top-decoration svg {
            width: 120px;
            height: 60px;
        }
        
        /* Main Title */
        .section-title {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #059669;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }
        
        .main-title {
            font-family: 'Poppins', sans-serif;
            font-size: 36px;
            font-weight: 800;
            color: #065F46;
            margin-bottom: 40px;
        }
        
        /* Moral Box */
        .moral-container {
            background: white;
            border-radius: 30px;
            padding: 50px 60px;
            max-width: 85%;
            box-shadow: 
                0 25px 50px rgba(16, 185, 129, 0.15),
                0 10px 20px rgba(16, 185, 129, 0.1);
            position: relative;
            z-index: 10;
        }
        
        .quote-mark {
            font-family: 'Poppins', sans-serif;
            font-size: 100px;
            color: #10B981;
            opacity: 0.2;
            position: absolute;
            top: 10px;
            left: 30px;
            line-height: 1;
        }
        
        .moral-text {
            font-size: 26px;
            line-height: 1.6;
            color: #065F46;
            text-align: center;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        
        .moral-divider {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #10B981, #34D399, #6EE7B7);
            border-radius: 2px;
            margin: 30px auto;
        }
        
        .moral-subtitle {
            font-size: 16px;
            color: #6B7280;
            text-align: center;
            font-style: italic;
        }
        
        /* Bottom Decorations */
        .bottom-decorations {
            display: flex;
            gap: 20px;
            margin-top: 50px;
        }
        
        .deco-item {
            width: 40px;
            height: 40px;
        }
        
        /* Corner SVGs */
        .corner-top-left {
            position: absolute;
            top: 20mm;
            left: 20mm;
            width: 80px;
            height: 80px;
            opacity: 0.4;
        }
        
        .corner-top-right {
            position: absolute;
            top: 20mm;
            right: 20mm;
            width: 70px;
            height: 70px;
            opacity: 0.4;
        }
        
        .corner-bottom-left {
            position: absolute;
            bottom: 30mm;
            left: 20mm;
            width: 60px;
            height: 60px;
            opacity: 0.3;
        }
        
        .corner-bottom-right {
            position: absolute;
            bottom: 30mm;
            right: 20mm;
            width: 70px;
            height: 70px;
            opacity: 0.3;
        }
        
        /* Footer */
        .footer {
            position: absolute;
            bottom: 20mm;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .page-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: #10B981;
            color: white;
            border-radius: 50%;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 700;
        }
        
        .star-green { fill: #10B981; }
        .heart-green { fill: #34D399; }
        .sparkle-green { fill: #6EE7B7; }
    </style>
</head>
<body>
    <div class="page">
        <div class="bg-pattern"></div>
        
        <!-- Corner Decorations -->
        <svg class="corner-top-left" viewBox="0 0 80 80">
            <path class="star-green" d="M40 0L48.5 28.5L80 32L56 52L62 80L40 64L18 80L24 52L0 32L31.5 28.5L40 0Z"/>
        </svg>
        
        <svg class="corner-top-right" viewBox="0 0 70 70">
            <path class="heart-green" d="M35 63L31.5 60C12 42 0 32 0 19C0 8 8 0 19 0C25.5 0 31.5 3.5 35 8.5C38.5 3.5 44.5 0 51 0C62 0 70 8 70 19C70 32 58 42 38.5 60L35 63Z"/>
        </svg>
        
        <svg class="corner-bottom-left" viewBox="0 0 60 60">
            <path class="sparkle-green" d="M30 0L34 26L60 30L34 34L30 60L26 34L0 30L26 26L30 0Z"/>
        </svg>
        
        <svg class="corner-bottom-right" viewBox="0 0 70 70">
            <path class="star-green" d="M35 0L42.5 25L70 28L49 46L54 70L35 56L16 70L21 46L0 28L27.5 25L35 0Z"/>
        </svg>
        
        <!-- Top Decoration -->
        <div class="top-decoration">
            <svg viewBox="0 0 120 60" fill="none">
                <path d="M20 30C20 24 24 20 30 20C36 20 40 24 40 30" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
                <path d="M40 30C40 24 44 20 50 20C56 20 60 24 60 30" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
                <path d="M60 30C60 24 64 20 70 20C76 20 80 24 80 30" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
                <path d="M80 30C80 24 84 20 90 20C96 20 100 24 100 30" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
                <circle cx="10" cy="30" r="4" fill="#6EE7B7"/>
                <circle cx="110" cy="30" r="4" fill="#6EE7B7"/>
            </svg>
        </div>
        
        <span class="section-title">✨ The Moral of the Story ✨</span>
        <h1 class="main-title">What We Learned</h1>
        
        <!-- Moral Box -->
        <div class="moral-container">
            <span class="quote-mark">"</span>
            <p class="moral-text">{{MORAL_TEXT}}</p>
            <div class="moral-divider"></div>
            <p class="moral-subtitle">Remember this lesson in your heart forever</p>
        </div>
        
        <!-- Bottom Decorations -->
        <div class="bottom-decorations">
            <svg class="deco-item" viewBox="0 0 40 40">
                <path class="star-green" d="M20 0L24 15L40 16L28 26L31 40L20 32L9 40L12 26L0 16L16 15L20 0Z"/>
            </svg>
            <svg class="deco-item" viewBox="0 0 40 40">
                <path class="heart-green" d="M20 36L17 33C7 24 0 18 0 11C0 5 5 0 11 0C15 0 18 2 20 5C22 2 25 0 29 0C35 0 40 5 40 11C40 18 33 24 23 33L20 36Z"/>
            </svg>
            <svg class="deco-item" viewBox="0 0 40 40">
                <path class="sparkle-green" d="M20 0L22 18L40 20L22 22L20 40L18 22L0 20L18 18L20 0Z"/>
            </svg>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <div class="page-number">{{PAGE_NUMBER}}</div>
        </div>
    </div>
</body>
</html>
