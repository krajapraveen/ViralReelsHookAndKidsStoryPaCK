<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            width: 210mm;
            height: 297mm;
            background: {{BG_COLOR}};
            position: relative;
            overflow: hidden;
        }
        
        .page {
            width: 100%;
            height: 100%;
            padding: 18mm 22mm 25mm 22mm;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px solid {{ACCENT_COLOR}};
        }
        
        .story-title {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: {{ACCENT_COLOR}};
            opacity: 0.8;
        }
        
        .chapter-badge {
            background: {{ACCENT_COLOR}};
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* Scene Title */
        .scene-title {
            font-family: 'Poppins', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: {{TEXT_ACCENT}};
            margin-bottom: 20px;
            padding: 15px 20px;
            background: rgba(255,255,255,0.7);
            border-radius: 15px;
            border-left: 5px solid {{ACCENT_COLOR}};
        }
        
        /* Content Area */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* Story Text Box */
        .story-box {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 25px 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            position: relative;
        }
        
        .story-text {
            font-size: 17px;
            line-height: 1.9;
            color: #374151;
            text-align: justify;
        }
        
        .story-text p {
            margin-bottom: 16px;
        }
        
        .story-text p:last-child {
            margin-bottom: 0;
        }
        
        /* Dialogue Box */
        .dialogue-box {
            background: linear-gradient(135deg, {{DIALOGUE_BG}} 0%, rgba(255,255,255,0.9) 100%);
            border-radius: 20px;
            padding: 20px 25px;
            margin: 15px 0;
            border-left: 4px solid {{ACCENT_COLOR}};
            position: relative;
        }
        
        .dialogue-box::before {
            content: '"';
            font-family: 'Poppins', sans-serif;
            font-size: 60px;
            color: {{ACCENT_COLOR}};
            opacity: 0.3;
            position: absolute;
            top: -10px;
            left: 15px;
            line-height: 1;
        }
        
        .speaker {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: {{TEXT_ACCENT}};
            margin-bottom: 8px;
        }
        
        .dialogue-text {
            font-size: 16px;
            font-style: italic;
            color: #4B5563;
            line-height: 1.7;
            padding-left: 10px;
        }
        
        /* Decorative Elements */
        .decoration {
            position: absolute;
            opacity: 0.15;
        }
        
        .corner-deco-top {
            top: 10mm;
            right: 10mm;
            width: 60px;
            height: 60px;
        }
        
        .corner-deco-bottom {
            bottom: 30mm;
            left: 10mm;
            width: 50px;
            height: 50px;
        }
        
        /* Footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 15px;
        }
        
        .brand-mini {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #9CA3AF;
        }
        
        .brand-mini svg {
            width: 16px;
            height: 16px;
        }
        
        .page-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: {{ACCENT_COLOR}};
            color: white;
            border-radius: 50%;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 700;
        }
        
        /* SVG fills */
        .star-fill { fill: {{ACCENT_COLOR}}; }
        .sparkle-fill { fill: {{ACCENT_LIGHT}}; }
    </style>
</head>
<body>
    <div class="page">
        <!-- Corner Decorations -->
        <svg class="decoration corner-deco-top" viewBox="0 0 60 60">
            <path class="star-fill" d="M30 0L36 22L60 26L42 42L46 60L30 50L14 60L18 42L0 26L24 22L30 0Z"/>
        </svg>
        
        <svg class="decoration corner-deco-bottom" viewBox="0 0 50 50">
            <path class="sparkle-fill" d="M25 0L28 22L50 25L28 28L25 50L22 28L0 25L22 22L25 0Z"/>
        </svg>
        
        <!-- Header -->
        <div class="header">
            <span class="story-title">{{STORY_TITLE}}</span>
            <span class="chapter-badge">Scene {{SCENE_NUMBER}}</span>
        </div>
        
        <!-- Scene Title -->
        <h2 class="scene-title">{{SCENE_TITLE}}</h2>
        
        <!-- Content -->
        <div class="content">
            <div class="story-box">
                <div class="story-text">
                    {{STORY_CONTENT}}
                </div>
            </div>
            
            {{DIALOGUE_SECTION}}
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <div class="brand-mini">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#9CA3AF"/>
                </svg>
                <span>CreatorStudio AI</span>
            </div>
            <div class="page-number">{{PAGE_NUMBER}}</div>
        </div>
    </div>
</body>
</html>
