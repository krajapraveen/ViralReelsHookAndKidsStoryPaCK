spring.application.name=CreatorStudio AI API
server.port=8001

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/creatorstudio}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:creatorstudio-secret-key-change-in-production-very-long-key-minimum-256-bits}
jwt.expiration=86400000

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_dummy}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:dummy_secret}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:dummy_webhook}

# CORS
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000,https://rating-insights.preview.emergentagent.com}

# AI Worker
worker.api.url=${WORKER_API_URL:http://localhost:5000}
# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.paymentService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.paymentService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.paymentService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.paymentService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.paymentService.waitDurationInOpenState=30000
resilience4j.circuitbreaker.instances.paymentService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.paymentService.automaticTransitionFromOpenToHalfOpenEnabled=true

resilience4j.circuitbreaker.instances.workerService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.workerService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.workerService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.workerService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.workerService.waitDurationInOpenState=60000
resilience4j.circuitbreaker.instances.workerService.permittedNumberOfCallsInHalfOpenState=3

resilience4j.retry.instances.paymentService.maxAttempts=3
resilience4j.retry.instances.paymentService.waitDuration=1000

resilience4j.retry.instances.workerService.maxAttempts=3
resilience4j.retry.instances.workerService.waitDuration=2000

# Rate Limiter
resilience4j.ratelimiter.instances.apiRateLimit.limitForPeriod=100
resilience4j.ratelimiter.instances.apiRateLimit.limitRefreshPeriod=60s
resilience4j.ratelimiter.instances.apiRateLimit.timeoutDuration=0
